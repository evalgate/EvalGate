# OTEL Integration Test Environment
#
# Spins up an OpenTelemetry Collector + Jaeger backend to verify
# that evalgate's OTelExporter produces valid OTLP JSON that actually
# lands in a real trace backend.
#
# Usage:
#   docker compose up -d
#   npx tsx ./verify-otel.ts
#   # Check Jaeger UI at http://localhost:16686
#   docker compose down

services:
  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger HTTP collector
      # 4317 is NOT exposed to host — the collector connects via Docker network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "4317:4317"   # OTLP gRPC receiver
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 3s
      timeout: 2s
      retries: 5
